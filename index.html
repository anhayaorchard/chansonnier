<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chansonnier Basque - Euskal Kantutegia</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#065f46">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kantutegia">
    <link class="apple-touch-icon" href="icon-192.png">
    
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .lyrics-box p { margin-bottom: 1.25rem; line-height: 1.8; font-family: Georgia, Cambria, serif; text-align: center; }
        strong { color: #b45309; font-weight: 800; font-size: 1.05em; } 
        u { text-decoration: underline; text-underline-offset: 4px; font-weight: 500; } 
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden select-none">

    <!-- En-tête -->
    <header class="bg-emerald-800 text-white shadow-md p-4 flex items-center justify-between z-10 shrink-0">
        <h1 class="text-lg md:text-2xl font-bold tracking-wide flex items-center gap-2">
            <i class="fa-solid fa-music text-emerald-300"></i> Chansonnier Basque
        </h1>
        <div class="flex items-center gap-3">
            <span id="connectionStatus" class="text-[10px] md:text-xs bg-emerald-950/50 px-2.5 py-1 rounded-full border border-emerald-600/30">
                <i class="fa-solid fa-sync fa-spin mr-1 text-emerald-400"></i> Chargement...
            </span>
            <button id="installBtn" class="hidden text-xs bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold px-3 py-1.5 rounded-lg transition shadow-md flex items-center gap-1">
                <i class="fa-solid fa-download"></i> Installer l'app
            </button>
        </div>
    </header>

    <!-- Conteneur Principal -->
    <div class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- BARRE LATÉRALE : Liste des chants -->
        <aside id="sidebar" class="w-full md:w-80 lg:w-96 bg-white border-r border-slate-200 flex flex-col h-full shadow-sm z-20">
            <!-- Recherche & Filtres -->
            <div class="p-4 border-b border-slate-200 bg-slate-50/50 space-y-3">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Rechercher un chant, auteur, compositeur..." 
                           class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-slate-400"></i>
                </div>
                <div>
                    <select id="dialectFilter" class="w-full bg-white border border-slate-300 rounded-lg p-2 text-xs md:text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        <option value="">Tous les dialectes</option>
                    </select>
                </div>
            </div>
            
            <!-- Liste des chansons -->
            <div id="songList" class="flex-1 overflow-y-auto divide-y divide-slate-100">
                <div class="p-8 text-center text-slate-500">
                    <i class="fa-solid fa-spinner fa-spin text-2xl text-emerald-600 mb-2 block"></i>
                    Chargement du chansonnier...
                </div>
            </div>
        </aside>

        <!-- PANNEAU DÉTAIL : Paroles -->
        <main id="detailPanel" class="hidden md:flex flex-1 bg-slate-50 overflow-y-auto p-4 md:p-8 flex-col justify-center items-center text-slate-400">
            <div class="text-center">
                <i class="fa-solid fa-music text-6xl mb-4 text-slate-200"></i>
                <p class="text-lg font-medium text-slate-500">Sélectionnez une chanson pour l'afficher</p>
            </div>
        </main>
    </div>

    <script>
        const SPREADSHEET_ID = '1q_4V-Mv_vxYpR6Dyt58jGec6u8nelQaXmkn3yu8xTak';
        const SPREADSHEET_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;

        let songs = [];
        let activeSongId = null;
        let activeMobileTab = 'lyrics';
        let deferredPrompt = null;

        function getDialectStyle(dialect) {
            const d = (dialect || '').toLowerCase().trim();
            
            // Souletin (Zuberera / Xiberotarrak)
            if (d.includes('soul') || d.includes('zuber') || d.includes('xiber')) {
                return { bg: 'bg-emerald-100', text: 'text-emerald-800', border: 'border-emerald-600', lightBg: 'bg-emerald-50/40', hoverBg: 'hover:bg-emerald-50/50', accentText: 'text-emerald-700' };
            }
            // Labourdin (Lapurtera)
            if (d.includes('labourd') || d.includes('lapurt')) {
                return { bg: 'bg-blue-100', text: 'text-blue-800', border: 'border-blue-600', lightBg: 'bg-blue-50/40', hoverBg: 'hover:bg-blue-50/50', accentText: 'text-blue-700' };
            }
            // Bas-Navarrais (Behe nafarrera)
            if (d.includes('bas-nav') || d.includes('behe naf')) {
                return { bg: 'bg-purple-100', text: 'text-purple-800', border: 'border-purple-600', lightBg: 'bg-purple-50/40', hoverBg: 'hover:bg-purple-50/50', accentText: 'text-purple-700' };
            }
            // Navarrais général ou autre Nafar
            if (d.includes('navar') || d.includes('nafar')) {
                return { bg: 'bg-violet-100', text: 'text-violet-800', border: 'border-violet-600', lightBg: 'bg-violet-50/40', hoverBg: 'hover:bg-violet-50/50', accentText: 'text-violet-700' };
            }
            // Gipuzkoan (Gipuzkera)
            if (d.includes('gipuz')) {
                return { bg: 'bg-rose-100', text: 'text-rose-800', border: 'border-rose-600', lightBg: 'bg-rose-50/40', hoverBg: 'hover:bg-rose-50/50', accentText: 'text-rose-700' };
            }
            // Biscayen (Bizkaiera)
            if (d.includes('bizk') || d.includes('bisc')) {
                return { bg: 'bg-amber-100', text: 'text-amber-800', border: 'border-amber-600', lightBg: 'bg-amber-50/40', hoverBg: 'hover:bg-amber-50/50', accentText: 'text-amber-700' };
            }
            // Batua (Unifié)
            if (d.includes('batua') || d.includes('commun') || d.includes('unifié')) {
                return { bg: 'bg-teal-100', text: 'text-teal-800', border: 'border-teal-600', lightBg: 'bg-teal-50/40', hoverBg: 'hover:bg-teal-50/50', accentText: 'text-teal-700' };
            }
            return { bg: 'bg-slate-100', text: 'text-slate-800', border: 'border-slate-600', lightBg: 'bg-slate-50/40', hoverBg: 'hover:bg-slate-50/50', accentText: 'text-slate-700' };
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.getElementById('installBtn');
            if (installBtn) installBtn.classList.remove('hidden');
        });

        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
                document.getElementById('installBtn').classList.add('hidden');
            }
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }

        async function loadData() {
            const cached = localStorage.getItem('chansonnier_songs');
            if (cached) {
                try {
                    songs = JSON.parse(cached);
                    populateDialectFilter();
                    renderSongList();
                    document.getElementById('connectionStatus').innerHTML = `<i class="fa-solid fa-circle-check text-emerald-400 mr-1"></i> Chargé (Hors-ligne)`;
                } catch(e) {}
            }

            try {
                const response = await fetch(SPREADSHEET_URL);
                const text = await response.text();
                const jsonString = text.slice(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const json = JSON.parse(jsonString);

                const cols = json.table.cols.map(c => c.label || '');
                let fetchedSongs = json.table.rows.map((r, index) => {
                    const song = {};
                    r.c.forEach((cell, idx) => {
                        const colName = cols[idx] || `col_${idx}`;
                        song[colName] = cell ? cell.v : '';
                    });
                    if (!song['ID']) song['ID'] = index + 1;
                    return song;
                }).filter(song => song['Izenbürüa']);

                fetchedSongs = fetchedSongs.filter(song => {
                    const isPublished = song['Publié'];
                    return !(isPublished === 'FALSE' || isPublished === false);
                });

                fetchedSongs.sort((a, b) => {
                    const titleA = (a['Izenbürüa'] || '').toString().toLowerCase();
                    const titleB = (b['Izenbürüa'] || '').toString().toLowerCase();
                    return titleA.localeCompare(titleB, 'fr');
                });

                songs = fetchedSongs;
                localStorage.setItem('chansonnier_songs', JSON.stringify(songs));

                populateDialectFilter();
                renderSongList();
                document.getElementById('connectionStatus').innerHTML = `<i class="fa-solid fa-cloud text-emerald-400 mr-1"></i> Synchronisé`;
            } catch (error) {
                if (songs.length === 0) {
                    document.getElementById('songList').innerHTML = `
                        <div class="p-8 text-red-600 text-sm text-center font-medium">
                            <i class="fa-solid fa-wifi-slash text-2xl mb-2 block"></i> Connexion requise pour le premier chargement.
                        </div>`;
                }
            }
        }

        function populateDialectFilter() {
            const select = document.getElementById('dialectFilter');
            const currentVal = select.value;
            select.innerHTML = '<option value="">Tous les dialectes</option>';
            const dialects = [...new Set(songs.map(s => s['Eüskalkia']).filter(Boolean))].sort();
            dialects.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d; opt.textContent = d;
                if (d === currentVal) opt.selected = true;
                select.appendChild(opt);
            });
        }

        function renderSongList(filteredSongs = songs) {
            const listEl = document.getElementById('songList');
            if (filteredSongs.length === 0) {
                listEl.innerHTML = `<div class="p-8 text-center text-slate-400 text-sm">Aucun chant ne correspond</div>`;
                return;
            }

            listEl.innerHTML = filteredSongs.map(song => {
                const author = song['Koblakaria'] ? song['Koblakaria'].toString().trim() : '';
                const composer = song['Hontzalea'] ? song['Hontzalea'].toString().trim() : '';
                let creditsText = (author && composer && author.toLowerCase() === composer.toLowerCase()) ? author : (author && composer ? `${author} | ${composer}` : (author || composer || 'Artiste inconnu'));

                const dialect = song['Eüskalkia'] || '';
                const style = getDialectStyle(dialect);
                const isSelected = activeSongId === song['ID'];

                return `
                    <button onclick="selectSong(${song['ID']})" class="w-full text-left p-4 ${style.hoverBg} focus:outline-none focus:bg-slate-100/50 transition border-l-4 ${isSelected ? style.border : 'border-transparent'} ${isSelected ? style.lightBg : ''} block">
                        <div class="font-bold text-slate-800 text-sm md:text-base">${song['Izenbürüa']}</div>
                        <div class="flex items-center justify-between mt-1 gap-2">
                            <span class="text-xs text-slate-500 truncate max-w-[75%]">${creditsText}</span>
                            ${dialect ? `<span class="text-[10px] ${style.bg} ${style.text} px-2 py-0.5 rounded-full font-semibold shrink-0">${dialect}</span>` : ''}
                        </div>
                    </button>
                `;
            }).join('');
        }

        function filterSongs() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const dialect = document.getElementById('dialectFilter').value;
            const filtered = songs.filter(song => {
                const matchesSearch = [song['Izenbürüa'], song['Koblakaria'], song['Hontzalea'], song['Nonkoa']].some(val => val && val.toString().toLowerCase().includes(search));
                return matchesSearch && (!dialect || song['Eüskalkia'] === dialect);
            });
            renderSongList(filtered);
        }

        // --- Algorithme d'alignement enrichi (Diff + Règles de Post-traitement) ---
        function diffLine(orig, phon) {
            const m = orig.length;
            const n = phon.length;
            const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
            
            for (let i = 0; i <= m; i++) dp[i][0] = i;
            for (let j = 0; j <= n; j++) dp[0][j] = j;
            
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (orig[i - 1].toLowerCase() === phon[j - 1].toLowerCase()) {
                        dp[i][j] = dp[i - 1][j - 1];
                    } else {
                        dp[i][j] = Math.min(dp[i - 1][j - 1] + 1, dp[i - 1][j] + 1, dp[i][j - 1] + 1);
                    }
                }
            }
            
            let i = m, j = n;
            const alignment = [];
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && orig[i - 1].toLowerCase() === phon[j - 1].toLowerCase()) {
                    alignment.push({ char: phon[j - 1], bold: false });
                    i--; j--;
                } else if (i > 0 && j > 0 && dp[i][j] === dp[i - 1][j - 1] + 1) { 
                    const c = phon[j - 1];
                    alignment.push({ char: c, bold: (c !== ' ') });
                    i--; j--;
                } else if (j > 0 && (i === 0 || dp[i][j] === dp[i][j - 1] + 1)) { 
                    const c = phon[j - 1];
                    alignment.push({ char: c, bold: (c !== ' ') });
                    j--;
                } else { i--; } 
            }
            
            alignment.reverse();
            
            // --- PASSE DE POST-TRAITEMENT DES RÈGLES PHONÉTIQUES ---
            
            // 1. Protection absolue : Immuniser les parenthèses et les R accentués
            for (let k = 0; k < alignment.length; k++) {
                const c = alignment[k].char;
                if (c === '(' || c === ')' || ['ŕ', 'ř', 'Ŕ', 'Ř'].includes(c)) {
                    alignment[k].bold = false;
                }
            }
            
            // 2. Règle structurelle : Séquence "il" -> "ll" (on propage le gras sur tout le groupe "ll")
            for (let k = 0; k < alignment.length - 1; k++) {
                if (alignment[k].char.toLowerCase() === 'l' && alignment[k+1].char.toLowerCase() === 'l') {
                    if (alignment[k].bold || alignment[k+1].bold) {
                        alignment[k].bold = true;
                        alignment[k+1].bold = true;
                    }
                }
            }
            
            // 3. Règle des aspirations standard (th, kh, ph, lh, nh) : Tout le digraphe passe en gras si l'un bouge
            for (let k = 0; k < alignment.length - 1; k++) {
                const c1 = alignment[k].char.toLowerCase();
                const c2 = alignment[k+1].char.toLowerCase();
                if (['t', 'k', 'p', 'l', 'n'].includes(c1) && c2 === 'h') {
                    if (alignment[k].bold || alignment[k+1].bold) {
                        alignment[k].bold = true;
                        alignment[k+1].bold = true;
                    }
                }
            }
            
            // 4. Cas particulier : Double R aspiré "rrh"
            for (let k = 0; k < alignment.length - 2; k++) {
                const c1 = alignment[k].char.toLowerCase();
                const c2 = alignment[k+1].char.toLowerCase();
                const c3 = alignment[k+2].char.toLowerCase();
                if (c1 === 'r' && c2 === 'r' && c3 === 'h') {
                    if (alignment[k].bold || alignment[k+1].bold || alignment[k+2].bold) {
                        alignment[k].bold = true;
                        alignment[k+1].bold = true;
                        alignment[k+2].bold = true;
                    }
                }
            }
            
            // Construction finale de la chaîne HTML sécurisée
            let html = "";
            let inBold = false;
            for (const item of alignment) {
                let escapedChar = item.char === '&' ? '&amp;' : (item.char === '<' ? '&lt;' : (item.char === '>' ? '&gt;' : item.char));
                if (item.bold && !inBold) { html += "<strong>"; inBold = true; }
                else if (!item.bold && inBold) { html += "</strong>"; inBold = false; }
                html += escapedChar;
            }
            if (inBold) html += "</strong>";
            return html;
        }

        function handleMelismas(text) {
            if (!text) return '';
            return text.toString().replace(/\[([^\]]+)\]/g, '<u>$1</u>');
        }

        function escapeHtml(text) {
            return text.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // Système d'affichage ligne par ligne centré
        function formatLyrics(text, origText = null) {
            if (!text) return '<p class="text-slate-400 italic">Paroles en cours de saisie...</p>';
            
            let normalizedText = text.toString().replace(/\\r\\n/g, '\n').replace(/\\n/g, '\n').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            let htmlContent = "";
            
            if (origText) {
                let normalizedOrig = origText.toString().replace(/\\r\\n/g, '\n').replace(/\\n/g, '\n').replace(/\r\n/g, '\n').replace(/\r/g, '\n');
                const origLines = normalizedOrig.split('\n');
                const phonLines = normalizedText.split('\n');
                const diffedLines = [];
                
                for (let l = 0; l < phonLines.length; l++) {
                    const oLine = origLines[l] || '';
                    let diffedLine = diffLine(oLine, phonLines[l]);
                    diffedLine = handleMelismas(diffedLine);
                    diffedLines.push(diffedLine);
                }
                
                htmlContent = diffedLines.join('\n').split(/\n\n+/).map(p => `<p>${p.split('\n').join('<br>')}</p>`).join('');
            } else {
                let safeText = handleMelismas(escapeHtml(normalizedText));
                htmlContent = safeText.split(/\n\n+/).map(p => `<p>${p.split('\n').join('<br>')}</p>`).join('');
            }
            
            return `<div class="lyrics-box text-slate-700 leading-relaxed">${htmlContent}</div>`;
        }

        function ensureAbsoluteUrl(url) {
            if (!url) return '';
            let clean = url.trim();
            return /^https?:\/\//i.test(clean) ? clean : 'https://' + clean;
        }

        function getYoutubeEmbedUrl(url) {
            if (!url) return null;
            let videoId = '';
            if (url.includes('youtube.com/watch')) {
                try { videoId = new URLSearchParams(new URL(url).search).get('v'); } catch(e) {}
            } else if (url.includes('youtu.be/')) {
                videoId = url.split('youtu.be/')[1]?.split('?')[0];
            }
            return videoId ? `https://www.youtube.com/embed/${videoId}` : null;
        }

        function renderAllMedia(rawUrls) {
            if (!rawUrls) return '';
            const urls = rawUrls.toString().split(/[\s,;\n]+/);
            let embedHtml = '', audioHtml = '', externalLinksHtml = '', count = 1;

            urls.forEach(url => {
                let cleanUrl = url.trim(); if (!cleanUrl) return;
                cleanUrl = ensureAbsoluteUrl(cleanUrl);
                const embedUrl = getYoutubeEmbedUrl(cleanUrl);
                const isAudioFile = /\.(mp3|wav|ogg|m4a|aac)(\?.*)?$/i.test(cleanUrl);

                if (embedUrl) {
                    embedHtml += `<div class="mb-5"><span class="block text-xs font-semibold text-slate-500 mb-1.5"><i class="fa-brands fa-youtube text-red-500 mr-1"></i> Version #${count} (Vidéo)</span><div class="aspect-video w-full rounded-xl overflow-hidden shadow-sm border border-slate-200 bg-black"><iframe class="w-full h-full" src="${embedUrl}" frameborder="0" allowfullscreen></iframe></div></div>`;
                    count++;
                } else if (isAudioFile) {
                    audioHtml += `<div class="mb-5 bg-slate-50 border border-slate-200 p-4 rounded-xl shadow-sm"><span class="block text-xs font-bold text-slate-500 mb-2.5"><i class="fa-solid fa-volume-high text-emerald-600 mr-1"></i> Version #${count} (Lecteur Audio)</span><audio controls class="w-full"><source src="${cleanUrl}" type="audio/${cleanUrl.split('.').pop().split('?')[0]}">Votre appareil ne supporte pas ce format audio.</audio></div>`;
                    count++;
                } else {
                    externalLinksHtml += `<a href="${cleanUrl}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold rounded-lg border border-slate-200 transition"><i class="fa-solid fa-arrow-up-right-from-square text-emerald-600"></i> Lien d'écoute #${count}</a>`;
                    count++;
                }
            });

            if (!embedHtml && !audioHtml && !externalLinksHtml) return '';
            return `<div class="mt-8 border-t border-slate-200 pt-6"><h4 class="text-sm font-extrabold text-slate-800 mb-4"><i class="fa-solid fa-play text-emerald-700 mr-2"></i>Interprétation & Enregistrements</h4>${embedHtml}${audioHtml}${externalLinksHtml ? `<div class="mt-2"><span class="block text-xs font-semibold text-slate-500 mb-2">Autres liens d'écoute</span><div class="flex flex-wrap gap-2">${externalLinksHtml}</div></div>` : ''}</div>`;
        }

        function selectSong(id) {
            activeSongId = id;
            const song = songs.find(s => s['ID'] == id);
            if (!song) return;

            renderSongList();
            const detailPanel = document.getElementById('detailPanel');
            if (window.innerWidth < 768) document.getElementById('sidebar').classList.add('hidden');
            
            detailPanel.className = "flex-1 bg-white overflow-y-auto p-4 md:p-8 flex flex-col";
            const dialect = song['Eüskalkia'] || '';
            const style = getDialectStyle(dialect);
            const hasPhonetic = !!song['Ahozkatzeko idazkera'];
            const hasTranslation = !!song['Frantsesera ützülpena'];

            // Traitement modulaire Auteur (Koblakaria) & Compositeur (Hontzalea)
            const author = song['Koblakaria'] ? song['Koblakaria'].toString().trim() : '';
            const composer = song['Hontzalea'] ? song['Hontzalea'].toString().trim() : '';
            let authorComposerHtml = '';

            if (author && composer && author.toLowerCase() === composer.toLowerCase()) {
                authorComposerHtml = `
                    <div class="col-span-2 sm:col-span-2">
                        <span class="block text-slate-400 text-[9px] font-bold uppercase tracking-wider">Auteur & Compositeur</span>
                        <span class="font-semibold text-slate-800 truncate block">${author}</span>
                    </div>`;
            } else {
                authorComposerHtml = `
                    <div>
                        <span class="block text-slate-400 text-[9px] font-bold uppercase tracking-wider">Auteur (Koblakaria)</span>
                        <span class="font-semibold text-slate-800 truncate block">${author || '—'}</span>
                    </div>
                    <div>
                        <span class="block text-slate-400 text-[9px] font-bold uppercase tracking-wider">Compositeur (Hontzalea)</span>
                        <span class="font-semibold text-slate-800 truncate block">${composer || '—'}</span>
                    </div>`;
            }

            let mobileTabsBar = '';
            if (hasPhonetic || hasTranslation) {
                mobileTabsBar = `
                    <div class="flex md:hidden border-b border-slate-200 mb-6 p-1 bg-slate-100 rounded-xl">
                        <button id="tabBtn-lyrics" onclick="switchMobileTab('lyrics')" class="flex-1 text-center py-2 text-xs font-bold rounded-lg transition duration-200 bg-white ${style.accentText} shadow-sm"><i class="fa-solid fa-language mr-1"></i> Original</button>
                        ${hasPhonetic ? `<button id="tabBtn-phonetic" onclick="switchMobileTab('phonetic')" class="flex-1 text-center py-2 text-xs font-bold rounded-lg text-slate-600 transition duration-200"><i class="fa-solid fa-ear-listen mr-1"></i> Phonétique</button>` : ''}
                        ${hasTranslation ? `<button id="tabBtn-translation" onclick="switchMobileTab('translation')" class="flex-1 text-center py-2 text-xs font-bold rounded-lg text-slate-600 transition duration-200"><i class="fa-solid fa-flag mr-1"></i> Traduction</button>` : ''}
                    </div>`;
            }

            detailPanel.innerHTML = `
                <div class="flex items-center justify-between md:hidden mb-4">
                    <button onclick="goBackToList()" class="flex items-center gap-1 ${style.text} font-extrabold text-sm py-2 px-3 ${style.lightBg} rounded-lg transition"><i class="fa-solid fa-arrow-left"></i> Retour</button>
                </div>
                <div class="border-b border-slate-200 pb-5 mb-5">
                    <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900 w-full text-center md:text-left">${song['Izenbürüa']}</h2>
                    ${dialect ? `<div class="w-full md:w-auto flex justify-center md:justify-start mt-2"><span class="${style.bg} ${style.text} text-[11px] px-3 py-1 rounded-full font-bold shadow-sm">${dialect}</span></div>` : ''}
                    
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mt-5 text-xs text-slate-600 text-center md:text-left">
                        ${authorComposerHtml}
                        <div><span class="block text-slate-400 text-[9px] font-bold uppercase tracking-wider">Origine</span><span class="font-semibold text-slate-800 truncate block">${song['Nonkoa'] || '—'}</span></div>
                        <div><span class="block text-slate-400 text-[9px] font-bold uppercase tracking-wider">Année</span><span class="font-semibold text-slate-800 block">${song['Urtea'] || '—'}</span></div>
                    </div>
                </div>
                ${mobileTabsBar}
                <div class="grid grid-cols-1 md:grid-cols-${(hasPhonetic ? 1 : 0) + (hasTranslation ? 1 : 0) + 1} gap-6 flex-1">
                    <div id="col-lyrics" class="bg-slate-50 p-5 rounded-2xl border border-slate-200/60 shadow-sm block">
                        <h3 class="hidden md:flex text-xs font-bold ${style.accentText} uppercase tracking-widest mb-4 border-b border-slate-200 pb-2 justify-between items-center"><span>Oraiko idazkera</span><span class="text-[9px] bg-slate-200/50 text-slate-900 px-2 py-0.5 rounded">Basque</span></h3>
                        ${formatLyrics(song['Oraiko idazkera'], null)}
                    </div>
                    ${hasPhonetic ? `
                    <div id="col-phonetic" class="bg-amber-50/30 p-5 rounded-2xl border border-amber-200/50 shadow-sm hidden md:block">
                        <h3 class="hidden md:flex text-xs font-bold text-amber-800 uppercase tracking-widest mb-4 border-b border-amber-200 pb-2 justify-between items-center"><span>Ahozkatzeko idazkera</span><span class="text-[9px] bg-amber-100 text-amber-900 px-2 py-0.5 rounded">Phonétique</span></h3>
                        ${formatLyrics(song['Ahozkatzeko idazkera'], song['Oraiko idazkera'])}
                    </div>` : ''}
                    ${hasTranslation ? `
                    <div id="col-translation" class="bg-slate-50/50 p-5 rounded-2xl border border-slate-200/60 shadow-sm hidden md:block">
                        <h3 class="hidden md:flex text-xs font-bold text-slate-600 uppercase tracking-widest mb-4 border-b border-slate-200 pb-2 justify-between items-center"><span>Traduction</span><span class="text-[9px] bg-slate-200 text-slate-700 px-2 py-0.5 rounded">Français</span></h3>
                        ${formatLyrics(song['Frantsesera ützülpena'], null)}
                    </div>` : ''}
                </div>
                ${song['Oharrak'] ? `<div class="mt-6 bg-blue-50/40 border border-blue-200/50 p-4 rounded-xl text-slate-700"><h4 class="text-xs font-bold text-blue-900 uppercase tracking-widest mb-1"><i class="fa-solid fa-circle-info mr-1"></i>Notes</h4><p class="text-sm leading-relaxed">${song['Oharrak']}</p></div>` : ''}
                ${renderAllMedia(song['Audio ütürria'])}
            `;
            if (window.innerWidth < 768) switchMobileTab('lyrics');
        }

        function goBackToList() {
            document.getElementById('sidebar').classList.remove('hidden');
            const detailPanel = document.getElementById('detailPanel');
            detailPanel.className = "hidden md:flex flex-1 bg-slate-50 overflow-y-auto p-4 md:p-8 flex-col justify-center items-center text-slate-400";
            detailPanel.innerHTML = `<div class="text-center"><i class="fa-solid fa-music text-6xl mb-4 text-slate-200"></i><p class="text-lg font-medium text-slate-500">Sélectionnez une chanson pour l'afficher</p></div>`;
            activeSongId = null;
            renderSongList();
        }

        function switchMobileTab(tab) {
            activeMobileTab = tab;
            const song = songs.find(s => s['ID'] == activeSongId);
            const style = getDialectStyle(song ? song['Eüskalkia'] : '');
            ['col-lyrics', 'col-phonetic', 'col-translation'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    if (id === 'col-lyrics' && tab === 'lyrics') el.className = 'block bg-slate-50 p-5 rounded-2xl border border-slate-200/60 shadow-sm';
                    else if (id === 'col-phonetic' && tab === 'phonetic') el.className = 'block bg-amber-50/30 p-5 rounded-2xl border border-amber-200/50 shadow-sm';
                    else if (id === 'col-translation' && tab === 'translation') el.className = 'block bg-slate-50/50 p-5 rounded-2xl border border-slate-200/60 shadow-sm';
                    else el.className = 'hidden md:block';
                }
            });
            const btnL = document.getElementById('tabBtn-lyrics'), btnP = document.getElementById('tabBtn-phonetic'), btnT = document.getElementById('tabBtn-translation');
            if (btnL) btnL.className = tab === 'lyrics' ? `flex-1 text-center py-2 text-xs font-bold rounded-lg bg-white ${style.accentText} shadow-sm` : 'flex-1 text-center py-2 text-xs font-bold rounded-lg text-slate-600';
            if (btnP) btnP.className = tab === 'phonetic' ? `flex-1 text-center py-2 text-xs font-bold rounded-lg bg-white text-amber-800 shadow-sm` : 'flex-1 text-center py-2 text-xs font-bold rounded-lg text-slate-600';
            if (btnT) btnT.className = tab === 'translation' ? `flex-1 text-center py-2 text-xs font-bold rounded-lg bg-white text-slate-800 shadow-sm` : 'flex-1 text-center py-2 text-xs font-bold rounded-lg text-slate-600';
        }

        document.getElementById('searchInput').addEventListener('input', filterSongs);
        document.getElementById('dialectFilter').addEventListener('change', filterSongs);
        loadData();
    </script>
</body>
</html>
